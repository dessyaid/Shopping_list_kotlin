name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run local unit tests
      run: ./gradlew testDebugUnitTest

    - name: Run connected tests (optional, requires emulator)
      # connectedCheck requires a running emulator or device. 
      # For standard CI it's common to only run unit tests or use a specific action for emulators.
      # run: ./gradlew connectedDebugAndroidTest
      run: echo "Skipping connected tests on basic CI runner"
